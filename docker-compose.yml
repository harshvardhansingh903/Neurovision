version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: neurovision-db
    environment:
      POSTGRES_DB: neurovision_db
      POSTGRES_USER: neurovision
      POSTGRES_PASSWORD: neurovision_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurovision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neurovision-network

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: neurovision-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://neurovision:neurovision_password@db:5432/neurovision_db
      FRONTEND_URL: http://localhost:3000
      DEBUG: "True"
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - neurovision-network
    restart: unless-stopped

  # React Frontend (optional - can run separately)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurovision-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - neurovision-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  neurovision-network:
    driver: bridge
